name = "MatrixConcentration"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MatrixConcentration"]
buildDir = ".audit_work/v1_recertification_recovery_build_v7"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[lean_lib]]
name = "MatrixConcentration"
